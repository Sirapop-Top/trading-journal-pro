<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="neonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00f2fe" flood-opacity="0.5" />
    </filter>
  </defs>
  
  <!-- Dark Rounded Container with Gradient Border -->
  <rect x="6" y="6" width="116" height="116" rx="28" fill="#0b0e17" stroke="url(#glowGrad)" stroke-width="5" />
  
  <!-- Candlestick Chart Icons representing Trading -->
  <!-- Candle 1: Bullish Green -->
  <line x1="36" y1="40" x2="36" y2="90" stroke="#10b981" stroke-width="3" />
  <rect x="28" y="52" width="16" height="28" rx="2" fill="#10b981" />
  
  <!-- Candle 2: Bearish Red -->
  <line x1="64" y1="55" x2="64" y2="105" stroke="#f43f5e" stroke-width="3" />
  <rect x="56" y="65" width="16" height="28" rx="2" fill="#f43f5e" />
  
  <!-- Candle 3: Rising Breakout Cyan -->
  <line x1="92" y1="20" x2="92" y2="75" stroke="#00f2fe" stroke-width="3" filter="url(#neonShadow)" />
  <rect x="84" y="32" width="16" height="32" rx="2" fill="url(#glowGrad)" filter="url(#neonShadow)" />
</svg>